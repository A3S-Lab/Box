[package]
name = "a3s-libkrun-sys"
version.workspace = true
edition = "2021"
authors = ["A3S Lab Team"]
description = "FFI bindings to libkrun with Windows WHPX backend support"
license = "MIT"
repository = "https://github.com/A3S-Lab/Box"
keywords = ["libkrun", "microvm", "whpx", "virtualization", "windows"]
categories = ["api-bindings", "os::windows-apis", "virtualization"]
readme = "README.md"

# Cargo omits files inside a Git submodule from crates.io packages. A
# deterministic `git archive` of the required libkrun sources keeps the Unix
# source fallback real without carrying its 100 MiB SNP sample disk. The three
# tested Windows runtime files are stored in a deterministic XZ archive so the
# universal package remains below crates.io's 10 MiB limit.
include = [
    "Cargo.toml",
    "CHANGELOG.md",
    "LICENSE",
    "README.md",
    "SOURCE-PROVENANCE.md",
    "THIRD_PARTY_NOTICES.md",
    "build.rs",
    "build_support.rs",
    "src/**",
    "tests/**",
    "examples/**",
    "firmware/**",
    "licenses/**",
    "vendor/libkrun-source.tar",
    "vendor/krun-windows-x64.tar.xz",
]

links = "a3s_krun"

[build-dependencies]
pkg-config = "0.3"
num_cpus = "1.16"

[dev-dependencies]
tempfile = "3.10"

[dependencies]
libc = "0.2"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = ["Win32_Foundation"] }

[features]
default = []
