ReleaseNotes: |-
  Release v0.8.0 - Windows WHPX Backend Support

  Major new feature: Full Windows Hypervisor Platform (WHPX) backend support!

  New Features:
  - Complete Windows Hypervisor Platform integration
  - virtiofs passthrough filesystem on Windows
  - virtio-net with TCP backend
  - virtio-blk block device support
  - virtio-console with Windows stdin/stdout
  - TSI (Transparent Socket Impersonation) for vsock

  Platform Support:
  - Linux x86_64 (KVM)
  - Linux aarch64 (KVM)
  - macOS arm64 (Hypervisor.framework)
  - Windows x86_64 (WHPX) - NEW!

  Requirements (Windows):
  Enable Windows Hypervisor Platform:
  Enable-WindowsOptionalFeature -Online -FeatureName HypervisorPlatform
  Restart-Computer
