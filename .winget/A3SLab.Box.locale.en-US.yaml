ShortDescription: MicroVM sandbox runtime with Windows WHPX backend support
Description: |-
  a3s-box is a lightweight microVM sandbox runtime that provides secure container execution
  using hardware virtualization. It supports multiple platforms including Linux (KVM),
  macOS (Hypervisor.framework), and Windows (WHPX - Windows Hypervisor Platform).

  Key features:
  - Windows Hypervisor Platform (WHPX) backend
  - virtiofs passthrough filesystem
  - virtio-net TCP backend for networking
  - virtio-blk block device support
  - virtio-console for serial I/O
  - TSI (Transparent Socket Impersonation) for vsock

  Requirements:
  - Windows 10/11 with Hyper-V Platform enabled
  - Run: Enable-WindowsOptionalFeature -Online -FeatureName HypervisorPlatform
Moniker: a3s-box
