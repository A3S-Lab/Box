name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  A3S_DEPS_STUB: "1"

jobs:
  # ── Lint & Format ──────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
      - name: Init submodules
        run: git -c http.extraheader= submodule update --init --recursive
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable 2026-07-16
        with:
          components: rustfmt
      - run: cd src && cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
      - name: Init submodules
        run: git -c http.extraheader= submodule update --init --recursive
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable 2026-07-16
        with:
          components: clippy
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Create stub libkrun
        run: |
          echo "void krun_stub(void) {}" > /tmp/krun_stub.c
          gcc -shared -o /tmp/libkrun.so /tmp/krun_stub.c
          sudo cp /tmp/libkrun.so /usr/lib/
          sudo ldconfig
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: src
      - run: cd src && cargo clippy --locked --workspace --all-targets -- -D warnings

  # ── Tests (stub mode, no VM) ───────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
      - name: Init submodules
        run: git -c http.extraheader= submodule update --init --recursive
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable 2026-07-16
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Create stub libkrun
        run: |
          echo "void krun_stub(void) {}" > /tmp/krun_stub.c
          gcc -shared -o /tmp/libkrun.so /tmp/krun_stub.c
          sudo cp /tmp/libkrun.so /usr/lib/
          sudo ldconfig
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: src
      - run: cd src && cargo test --locked --workspace --lib

  # The RuntimeClass shim is an intentionally standalone Cargo workspace, so
  # none of the src workspace gates above compile or test it.
  containerd-shim:
    name: Containerd Shim (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable 2026-07-16
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: containerd-shim
      - name: Check formatting
        working-directory: containerd-shim
        run: cargo fmt --all -- --check
      - name: Lint
        working-directory: containerd-shim
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: Test
        working-directory: containerd-shim
        run: cargo test --locked --all-targets
      - name: Test RuntimeClass installer
        run: bash deploy/scripts/test-install-runtimeclass.sh

  # ── Pinned E2B protocol and SDK surface drift gate ────────────
  e2b-contract:
    name: E2B Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable 2026-07-16
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: src
      - name: Verify pinned contracts and SDK exports
        run: cd src && cargo run --locked -p a3s-box-compat --bin a3s-box-e2b-contract -- verify

  # ── Pinned official E2B client wire compatibility gate ────────
  e2b-official-clients:
    name: E2B Official Clients
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: '0.11.8'
          enable-cache: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable 2026-07-16
      - name: Build Rust lifecycle fixture server
        run: cd src && cargo build --locked -p a3s-box-compat --bin a3s-box-e2b-fixture-server
      - name: Test production client harness
        run: python3 compat/e2b/fixtures/official-clients/test_run_production.py -v
      - name: Verify official client lifecycle requests
        run: >-
          python3 compat/e2b/fixtures/official-clients/run_fixtures.py verify
          --rust-server-bin src/target/debug/a3s-box-e2b-fixture-server

  # ── Native Python and TypeScript SDK package gate ─────────────
  sdk-packages:
    name: SDK Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json
      - name: Build and test Python package
        run: |
          python -m pip install build
          python -m build sdk/python
          python -m venv /tmp/a3s-box-python-sdk
          /tmp/a3s-box-python-sdk/bin/pip install sdk/python/dist/*.whl
          /tmp/a3s-box-python-sdk/bin/python -m unittest discover -s sdk/python/tests
      - name: Build and test TypeScript package
        working-directory: sdk/typescript
        run: |
          npm ci
          npm run build
          npm test
          npm pack --dry-run

  # ── Build check (compile only, no artifacts) ────────────────────
  build-check:
    name: Build Check (${{ matrix.target }})
    needs: [fmt, clippy, test, e2b-contract, e2b-official-clients, sdk-packages]
    strategy:
      matrix:
        include:
          - target: linux-x86_64
            os: ubuntu-latest
          - target: linux-arm64
            os: ubuntu-24.04-arm
          - target: macos-arm64
            os: macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
      - name: Init submodules
        run: git -c http.extraheader= submodule update --init --recursive

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable 2026-07-16

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libssl-dev \
            musl-tools libclang-dev protobuf-compiler

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install lld llvm protobuf

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: |
            src -> target
            containerd-shim -> target
          key: ${{ matrix.target }}

      - name: Check compilation
        run: |
          cd src
          cargo check --locked --release -p a3s-box-cli -p a3s-box-shim
          if [ "${{ runner.os }}" = "Linux" ]; then
            cargo check --locked --release -p a3s-box-cri
            cargo check --locked --release -p a3s-box-compat --bin a3s-box-e2b
          fi
      - name: Check containerd RuntimeClass shim
        if: runner.os == 'Linux'
        working-directory: containerd-shim
        run: cargo check --locked --release --all-targets

  # ── Windows native WHPX build check ────────────────────────────
  build-windows:
    name: Build Windows WHPX
    needs: [fmt, clippy, test, e2b-contract, e2b-official-clients, sdk-packages]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
      - name: Init submodules
        run: git -c http.extraheader= submodule update --init --recursive
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable 2026-07-16
        with:
          targets: x86_64-pc-windows-msvc
      - name: Verify bundled libkrun source archive
        shell: pwsh
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts/package-libkrun-source.ps1 -Check
      - name: Verify bundled Windows libkrun archive
        shell: pwsh
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts/package-libkrun-windows.ps1 -Check
      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0
      - name: Build libkrun Linux init payload
        shell: pwsh
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File src/deps/libkrun-sys/vendor/libkrun/scripts/build-windows-init.ps1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: src
          key: windows-whpx
      - name: Build Windows native binaries
        run: |
          Remove-Item Env:A3S_DEPS_STUB -ErrorAction SilentlyContinue
          $separator = [char]0x1f
          $env:CARGO_ENCODED_RUSTFLAGS = [string]::Join($separator, @(
            "--remap-path-prefix=$env:GITHUB_WORKSPACE=.",
            "--remap-path-prefix=$env:USERPROFILE=."
          ))
          cd src
          cargo build --locked --release -p a3s-box-cli -p a3s-box-shim --target x86_64-pc-windows-msvc
      - name: Verify Windows artifact bundle
        shell: pwsh
        run: |
          $required = @(
            'src/target/x86_64-pc-windows-msvc/release/a3s-box.exe',
            'src/target/x86_64-pc-windows-msvc/release/a3s-box-shim.exe',
            'src/target/x86_64-pc-windows-msvc/release/krun.dll',
            'src/target/x86_64-pc-windows-msvc/release/libkrunfw.dll'
          )
          foreach ($path in $required) {
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Required Windows artifact is missing: $path"
            }
          }
      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: windows-whpx
          path: |
            src/target/x86_64-pc-windows-msvc/release/a3s-box.exe
            src/target/x86_64-pc-windows-msvc/release/a3s-box-shim.exe
            src/target/x86_64-pc-windows-msvc/release/krun.dll
            src/target/x86_64-pc-windows-msvc/release/libkrunfw.dll

  # ── Real microVM integration gate (self-hosted, /dev/kvm) ───────
  # The fmt/clippy/test/build jobs above all run in STUB mode
  # (A3S_DEPS_STUB) and never boot a real microVM, so a runtime
  # regression (boot, exec, virtio-fs, CRI lifecycle, snapshot-fork)
  # cannot be caught by hosted CI — GitHub-hosted runners have no
  # /dev/kvm. This job links REAL libkrun and runs the `#[ignore]`
  # integration + crictl-smoke suites against a real microVM.
  #
  # ARMING THE GATE (one-time, operator — see docs/ci-kvm-runner.md):
  #   1. Register a self-hosted runner that has /dev/kvm, with labels:
  #        self-hosted, linux, kvm
  #   2. Set repository variable  KVM_CI = true
  #        (Settings -> Secrets and variables -> Actions -> Variables)
  # Until both are done this job is SKIPPED (inert) and never blocks a PR.
  integration-kvm:
    name: Integration (real microVM, KVM)
    needs: [fmt, clippy, test, e2b-contract, e2b-official-clients, sdk-packages]
    if: github.event_name != 'pull_request' && vars.KVM_CI == 'true'
    runs-on: [self-hosted, linux, kvm]
    timeout-minutes: 75
    # The runner has no direct docker.io egress (CN network), so the smoke
    # tests pull alpine/busybox through a mirror. The image keeps its canonical
    # docker.io identity; only the fetch is redirected. Override per-runner with
    # the KVM_CI_REGISTRY_MIRRORS repo variable.
    env:
      A3S_REGISTRY_MIRRORS: ${{ vars.KVM_CI_REGISTRY_MIRRORS || 'docker.io=docker.m.daocloud.io' }}
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
      - name: Init submodules
        run: git -c http.extraheader= submodule update --init --recursive
      # The self-hosted runner already has a working rustup/cargo. Using
      # dtolnay/rust-toolchain forces rustup to re-sync the whole `stable`
      # channel (7 components) on every run — ~20 min on this box's network,
      # which blew the job timeout. Use the runner's existing toolchain: add the
      # musl target (a fast no-op if already installed) and put cargo on PATH
      # for later steps (the runner service env does not source a login shell).
      - name: Use the runner's existing Rust toolchain
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/rustup" target add x86_64-unknown-linux-musl
      # NOTE: no Swatinem/rust-cache here — fetching that action from
      # codeload.github.com times out on this runner's network, which fails
      # "Set up job". The self-hosted runner keeps a warm cargo registry, and
      # the 75-min budget covers a cold libkrun build.
      - name: Verify /dev/kvm is present
        run: |
          if [ ! -e /dev/kvm ]; then
            echo "::error::/dev/kvm missing — this runner cannot boot microVMs"; exit 1
          fi
          echo "/dev/kvm present"
      # Build REAL binaries: unset the stub so libkrun-sys compiles the
      # vendored libkrun (build.rs gates on env::var("A3S_DEPS_STUB").is_ok(),
      # so the var must be UNSET, not just emptied).
      - name: Build real binaries + musl guest-init (no stub)
        run: |
          unset A3S_DEPS_STUB
          cd src
          cargo build --locked --release -p a3s-box-guest-init --target x86_64-unknown-linux-musl
          cargo build --locked --release -p a3s-box-cli -p a3s-box-cri -p a3s-box-shim
      - name: Core smoke — real boot + exec over virtio-fs
        run: |
          unset A3S_DEPS_STUB
          cd src
          cargo test --locked --release -p a3s-box-cli --test core_smoke -- --ignored --nocapture --test-threads=1
      # Keep the cached foreground no-op inside a bounded production envelope.
      # Docker is intentionally unavailable on this runner; the original
      # macOS/HVF Docker ratio remains a separate hardware-specific comparison.
      - name: Foreground latency — cached no-op p50 regression gate
        env:
          A3S_BOX: ${{ github.workspace }}/src/target/release/a3s-box
          IMAGE: ${{ vars.KVM_CI_AGENT_IMAGE || 'docker.m.daocloud.io/library/alpine:latest' }}
          FOREGROUND_RUNS: "10"
          FOREGROUND_WARMUPS: "1"
          FOREGROUND_DOCKER: "0"
          # Default includes headroom for normal runner noise; dedicated
          # runners can tighten it with the repository variable.
          FOREGROUND_MAX_P50_MS: ${{ vars.KVM_CI_FOREGROUND_MAX_P50_MS || '3200' }}
        run: |
          unset A3S_DEPS_STUB
          chmod +x bench/bench.sh
          bench/bench.sh foreground
      - name: CRI crictl smoke — full pod/container lifecycle
        env:
          A3S_BOX_CRI_SMOKE: "1"
          A3S_BOX_CRI_SMOKE_AGENT_IMAGE: ${{ vars.KVM_CI_AGENT_IMAGE || 'docker.m.daocloud.io/library/alpine:latest' }}
          # A3S_REGISTRY_MIRRORS inherited from the job env (covers docker.io).
        run: |
          unset A3S_DEPS_STUB
          cd src
          cargo test --locked --release -p a3s-box-cri --test crictl_smoke -- --ignored --nocapture --test-threads=1
      # Gate leak-freeness under churn against REAL VMs: create/run/remove cycles
      # must return orphan shims / overlay mounts / box dirs to baseline. Exits
      # non-zero on a leak, so a resource-leak regression fails the gate.
      - name: Leak assertion — no orphan shims/mounts/box-dirs after churn
        env:
          A3S_BOX: ${{ github.workspace }}/src/target/release/a3s-box
          CHURN: "20"
        run: |
          unset A3S_DEPS_STUB
          chmod +x bench/bench.sh
          bench/bench.sh leak
      # Gate the cross-process advisory lock on boxes.json against REAL VMs:
      # concurrent `run -d` processes must NOT lose each other's state writes.
      # The unit tests only race in-process threads, so a broken/missing flock
      # across separate a3s-box processes is invisible to them — this boots a
      # fleet at once and asserts no lost update + intact JSON. Exits non-zero
      # on a lost update, failing the gate.
      - name: Race assertion — no lost update on boxes.json under concurrent run -d
        env:
          A3S_BOX: ${{ github.workspace }}/src/target/release/a3s-box
          RACE: "8"
        run: |
          unset A3S_DEPS_STUB
          chmod +x bench/bench.sh
          bench/bench.sh race
      # SDK programmable-CI pipeline against REAL microVMs: warm + CoW fork-per-step,
      # parallel collect-all, `::metric` extraction, fork isolation, leak-freeness,
      # and crash-orphan recovery (sweep_orphans). The unit suite only drives a fake
      # CLI, so this is the only gate that the real fork/snapshot path actually works.
      - name: SDK pipeline integration — real fork-per-step + sweep
        env:
          A3S_BOX: ${{ github.workspace }}/src/target/release/a3s-box
          A3S_SDK_TEST_IMAGE: ${{ vars.KVM_CI_AGENT_IMAGE || 'docker.m.daocloud.io/library/alpine:latest' }}
        run: |
          unset A3S_DEPS_STUB
          cd src
          cargo test --locked --release -p a3s-box-sdk --features pipeline-cli --test integration_kvm -- --ignored --nocapture --test-threads=1
      # Soak the fork-eval loop: sustained churn must stay leak-free (no orphan
      # boxes/snapshots, snapshot count flat) and memory-stable. Light here (120
      # fork-evals); crank A3S_SDK_SOAK_FORKS for a manual long soak.
      - name: SDK pipeline soak — leak-free under churn
        env:
          A3S_BOX: ${{ github.workspace }}/src/target/release/a3s-box
          A3S_SDK_TEST_IMAGE: ${{ vars.KVM_CI_AGENT_IMAGE || 'docker.m.daocloud.io/library/alpine:latest' }}
          A3S_SDK_SOAK_FORKS: "120"
        run: |
          unset A3S_DEPS_STUB
          cd src
          cargo test --locked --release -p a3s-box-sdk --features pipeline-cli --test soak_kvm -- --ignored --nocapture --test-threads=1
