apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: a3s-box-cri
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "a3s-box.labels" . | nindent 4 }}
    app.kubernetes.io/component: cri-runtime
spec:
  selector:
    matchLabels:
      {{- include "a3s-box.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "a3s-box.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "a3s-box.serviceAccountName" . }}
      hostPID: false
      hostNetwork: false
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: a3s-box-cri
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--socket={{ .Values.config.socketPath }}"
            - "--image-dir=/var/lib/a3s-box/images"
            - "--image-cache-size={{ .Values.config.imageCacheSize }}"
          env:
            - name: RUST_LOG
              valueFrom:
                configMapKeyRef:
                  name: a3s-box-config
                  key: log-level
          securityContext:
            privileged: {{ .Values.securityContext.privileged }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: run-a3s-box
              mountPath: /var/run/a3s-box
            - name: image-store
              mountPath: /var/lib/a3s-box/images
            - name: dev-kvm
              mountPath: /dev/kvm
            - name: a3s-home
              mountPath: /root/.a3s
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "test -S {{ .Values.config.socketPath }}"
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "test -S {{ .Values.config.socketPath }}"
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
      volumes:
        - name: run-a3s-box
          hostPath:
            path: /var/run/a3s-box
            type: DirectoryOrCreate
        - name: image-store
          hostPath:
            path: /var/lib/a3s-box/images
            type: DirectoryOrCreate
        - name: dev-kvm
          hostPath:
            path: /dev/kvm
            type: CharDevice
        - name: a3s-home
          hostPath:
            path: /var/lib/a3s-box/home
            type: DirectoryOrCreate
