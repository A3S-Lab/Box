apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: {{ .Values.runtimeHandler }}
  labels:
    {{- include "a3s-box.labels" . | nindent 4 }}
handler: {{ .Values.runtimeHandler }}
overhead:
  podFixed:
    memory: {{ .Values.overhead.memory | quote }}
    cpu: {{ .Values.overhead.cpu | quote }}
scheduling:
  nodeSelector:
    {{- toYaml .Values.nodeSelector | nindent 4 }}
